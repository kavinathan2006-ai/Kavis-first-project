<!DOCTYPE html>
<html>
<head>
  <title>Kavi Project</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    /* Galaxy Background */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://i.imgur.com/9QZ7Z6F.jpg') no-repeat center center/cover;
      z-index: -1;
      opacity: 0.7;
    }

    .container {
      margin-top: 80px;
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 20px #00f0ff;
    }

    h1 {
      color: #00f0ff;
    }

    label {
      display: block;
      margin-top: 10px;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #00f0ff;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #00c0cc;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Kavi Project</h1>

  <label>Name</label>
  <input type="text" id="name">

  <label>Age</label>
  <input type="number" id="age">

  <label>College Name</label>
  <input type="text" id="clg">

  <label>Phone Number</label>
  <input type="text" id="phone">

  <button onclick="submitData()">Submit</button>
</div>

<script>
function submitData() {
  const data = {
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    clg: document.getElementById("clg").value,
    phone: document.getElementById("phone").value
  };

  fetch("https://script.google.com/macros/s/AKfycbzKJtXMMWeT7x03DWQjoNWAYFozkRAsysi0RyNJG85-WoyHXgto3SBVL1yYkB_iTl8Y/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    alert("Data submitted successfully!");
  })
  .catch(err => alert("Error: " + err));
}
</script>

</body>
</html>
